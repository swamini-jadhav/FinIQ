services:
  # Backend Node.js Service
  - type: web
    name: finiq-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          name: finiq-ml-service
          type: web
          property: host
      - key: NEWSAPI_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: finiq-frontend
          type: web
          property: host

  # ML Service Flask
  - type: web
    name: finiq-ml-service
    env: python
    region: oregon
    plan: free
    buildCommand: cd ml-service && pip install -r requirements.txt
    startCommand: cd ml-service && gunicorn app:app
    envVars:
      - key: FLASK_PORT
        value: 5001
      - key: FLASK_ENV
        value: production
      - key: NEWSAPI_KEY
        sync: false

  # Frontend React
  - type: web
    name: finiq-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: finiq-backend
          type: web
          property: host
      - key: REACT_APP_ML_API_URL
        fromService:
          name: finiq-ml-service
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
